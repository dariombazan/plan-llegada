<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plan Llegar Puntual al Trabajo</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transition: 0.3s;
}

/* MODO OSCURO */
.dark {
    background: #121212;
    color: white;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 370px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.dark .container {
    background: #1e1e1e;
}

.logo {
    display: block;
    margin: 0 auto 10px;
    width: 60px;
}

h2 {
    text-align: center;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* BOTONES */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #70b22d;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* BOTÓN VOLVER */
.volver {
    background: #2d3436;
}

/* TOGGLE */
.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
}

/* RESULTADO */
.main-time {
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    color: #70b22d;
}

.timeline {
    border-left: 3px solid #70b22d;
    margin-left: 15px;
    padding-left: 25px;
}

.event {
    margin-bottom: 15px;
    position: relative;
}

.event::before {
    content: '';
    position: absolute;
    left: -18px;
    top: 6px;
    width: 12px;
    height: 12px;
    background: #70b22d;
    border-radius: 50%;
}

.time {
    font-weight: bold;
}

.resumen {
    margin-top: 20px;
    text-align: center;
    font-size: 16px;
    font-weight: bold;
}

.resumen span {
    display: block;
    margin-top: 5px;
    font-size: 18px;
}

/* ERROR */
.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">

<!-- FORMULARIO -->
<div id="pantallaFormulario">

<img src="logo.png" class="logo">
<h2>Plan de Llegada Puntual</h2>

<input type="number" id="hora" placeholder="Hora entrada (HH)">
<input type="number" id="distancia" placeholder="Distancia (km)">

<select id="transporte">
<option value="" disabled selected>Seleccione transporte</option>
<option value="carro">Carro</option>
<option value="moto">Moto</option>
<option value="bus">Bus</option>
<option value="bicicleta">Bicicleta</option>
<option value="metro">Metro</option>
</select>

<input type="number" id="alistamiento" placeholder="Tiempo alistamiento (min)">
<input type="number" id="trafico" placeholder="Tráfico (min)">

<button onclick="calcular()">Calcular</button>

<div id="botonModo" class="toggle" onclick="modoOscuro()">🌙 Modo oscuro</div>

<div id="error" class="error"></div>

</div>

<!-- RESULTADO -->
<div id="pantallaResultado" style="display:none;">

<h2>Tu Plan</h2>

<div id="resultado"></div>

<button class="volver" onclick="volver()">⬅ Volver</button>

</div>

</div>

<script>

function iconoTransporte(tipo){
    if(tipo==="carro") return "🚗";
    if(tipo==="moto") return "🏍️";
    if(tipo==="bus") return "🚌";
    if(tipo==="bicicleta") return "🚲";
    if(tipo==="metro") return "🚇";
}

function convertirHora(min){
    let h=Math.floor(min/60);
    let m=Math.floor(min%60);
    return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

function calcular(){

let error=document.getElementById("error");
error.innerHTML="";

let hora=parseInt(document.getElementById("hora").value);
let distancia=parseFloat(document.getElementById("distancia").value);
let transporte=document.getElementById("transporte").value;
let alistamiento=parseFloat(document.getElementById("alistamiento").value);
let trafico=parseFloat(document.getElementById("trafico").value);

if(isNaN(hora)||hora<0||hora>23){
    error.innerHTML="Hora inválida";
    return;
}

if(!transporte){
    error.innerHTML="Seleccione transporte";
    return;
}

let velocidades={
carro:40,moto:50,bus:25,bicicleta:15,metro:60
};

let velocidad=velocidades[transporte];
let margen=15;

let tiempo=(distancia/velocidad)*60+trafico;
let salir=(hora*60)-tiempo;
let despertar=salir-alistamiento-margen;

if(despertar<0){
    error.innerHTML="Tiempo insuficiente";
    return;
}

let t1=despertar+alistamiento*0.4;
let t2=t1+alistamiento*0.3;
let t3=t2+alistamiento*0.3;

document.getElementById("resultado").innerHTML=`

<div class="main-time">
    <div style="font-size:14px; color:gray;">Inicio del día</div>
    ${convertirHora(despertar)}
</div>

<div class="timeline">
<div class="event">
    <div class="time">🛌 ${convertirHora(despertar)}</div>
    <div>Despertar</div>
</div>

<div class="event">
<div class="time">🚿 ${convertirHora(despertar)} - ${convertirHora(t1)}</div>
<div>Aseo</div>
</div>

<div class="event">
<div class="time">🍳 ${convertirHora(t1)} - ${convertirHora(t2)}</div>
<div>Desayuno</div>
</div>

<div class="event">
<div class="time">👔 ${convertirHora(t2)} - ${convertirHora(t3)}</div>
<div>Prepararse</div>
</div>

<div class="event">
<div class="time">🚪 ${convertirHora(salir)}</div>
<div>Salida</div>
</div>

</div>

<div class="resumen">
${iconoTransporte(transporte)} ${transporte} <br>
⏱ ${tiempo.toFixed(1)} min
</div>
`;

document.getElementById("pantallaFormulario").style.display="none";
document.getElementById("pantallaResultado").style.display="block";

}

function volver(){
document.getElementById("pantallaResultado").style.display="none";
document.getElementById("pantallaFormulario").style.display="block";
}

function modoOscuro(){
let body=document.body;
let boton=document.getElementById("botonModo");

body.classList.toggle("dark");

if(body.classList.contains("dark")){
boton.innerHTML="☀️ Modo claro";
localStorage.setItem("modo","oscuro");
}else{
boton.innerHTML="🌙 Modo oscuro";
localStorage.setItem("modo","claro");
}
}

window.onload=function(){
let modo=localStorage.getItem("modo");
let boton=document.getElementById("botonModo");

if(modo==="oscuro"){
document.body.classList.add("dark");
boton.innerHTML="☀️ Modo claro";
}
}

</script>

</body>
</html>
