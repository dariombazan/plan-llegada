<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plan de Llegada</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transition: 0.3s;
}

.dark {
    background: #1e1e1e;
    color: white;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.dark .container {
    background: #2c2c2c;
}

h2 {
    text-align: center;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #4facfe;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.resultado {
    margin-top: 15px;
}

.actividad {
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    color: white;
    font-size: 13px;
}

.despertar { background: #6c5ce7; }
.aseo { background: #00b894; }
.desayuno { background: #fdcb6e; color: black; }
.preparacion { background: #0984e3; }
.salida { background: #d63031; }

.barra {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    margin-top: 10px;
}

.progreso {
    height: 10px;
    background: #00b894;
    border-radius: 10px;
    width: 0%;
    transition: 0.5s;
}

.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">

<!-- PANTALLA FORMULARIO -->
<div id="pantallaFormulario">

<h2>🚀 Plan de Llegada</h2>

<label>Hora entrada (HH)</label>
<input type="number" id="hora">

<label>Distancia (km)</label>
<input type="number" id="distancia">

<label>Transporte</label>
<select id="transporte">
    <option value="carro">Carro</option>
    <option value="moto">Moto</option>
    <option value="bus">Bus</option>
    <option value="bicicleta">Bicicleta</option>
    <option value="metro">Metro</option>
</select>

<label>Alistamiento (min)</label>
<input type="number" id="alistamiento">

<label>Tráfico (min)</label>
<input type="number" id="trafico">

<button onclick="calcular()">Calcular</button>

<div class="toggle" onclick="modoOscuro()">🌙 Modo oscuro</div>

<div id="error" class="error"></div>

</div>

<!-- PANTALLA RESULTADO -->
<div id="pantallaResultado" style="display:none;">

<h2>📊 Resultado</h2>

<div id="resultado" class="resultado"></div>

<button onclick="volver()">⬅ Volver</button>

</div>

</div>

<script>

function convertirHora(min) {
    let h = Math.floor(min / 60);
    let m = Math.floor(min % 60);
    return String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0');
}

function calcular() {

    let error = document.getElementById("error");
    error.innerHTML = "";

    let hora = parseInt(document.getElementById("hora").value);
    let distancia = parseFloat(document.getElementById("distancia").value);
    let transporte = document.getElementById("transporte").value;
    let alistamiento = parseFloat(document.getElementById("alistamiento").value);
    let trafico = parseFloat(document.getElementById("trafico").value);

    if (isNaN(hora) || hora < 0 || hora > 23) {
        error.innerHTML = "Hora inválida";
        return;
    }

    let velocidades = {
        carro: 40,
        moto: 50,
        bus: 25,
        bicicleta: 15,
        metro: 60
    };

    let velocidad = velocidades[transporte];
    let margen = 15;

    let tiempo_desplazamiento = (distancia / velocidad) * 60 + trafico;
    let hora_salir = (hora * 60) - tiempo_desplazamiento;
    let hora_despertar = hora_salir - alistamiento - margen;

    if (hora_despertar < 0) {
        error.innerHTML = "⚠️ Tiempo insuficiente. Ajusta los valores.";
        return;
    }

    let aseo = alistamiento * 0.4;
    let desayuno = alistamiento * 0.3;
    let preparacion = alistamiento * 0.3;

    let t1 = hora_despertar + aseo;
    let t2 = t1 + desayuno;
    let t3 = t2 + preparacion;

    let total = alistamiento + tiempo_desplazamiento + margen;

    document.getElementById("resultado").innerHTML = `
        <div class="actividad despertar">
            🛌 Despertarse: ${convertirHora(hora_despertar)}
        </div>

        <div class="actividad aseo">
            🚿 Aseo: ${convertirHora(hora_despertar)} → ${convertirHora(t1)}
        </div>

        <div class="actividad desayuno">
            🍳 Desayuno: ${convertirHora(t1)} → ${convertirHora(t2)}
        </div>

        <div class="actividad preparacion">
            👔 Prepararse: ${convertirHora(t2)} → ${convertirHora(t3)}
        </div>

        <div class="actividad salida">
            🚪 Salir: ${convertirHora(hora_salir)}
        </div>

        <br>
        🚗 Transporte: ${transporte} <br>
        ⏱ Tiempo total: ${total.toFixed(2)} min

        <div class="barra">
            <div class="progreso" id="barraProgreso"></div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("barraProgreso").style.width = "100%";
    }, 100);

    // Guardar datos
    localStorage.setItem("hora", hora);
    localStorage.setItem("distancia", distancia);
    localStorage.setItem("transporte", transporte);
    localStorage.setItem("alistamiento", alistamiento);
    localStorage.setItem("trafico", trafico);

    // Cambiar pantalla
    document.getElementById("pantallaFormulario").style.display = "none";
    document.getElementById("pantallaResultado").style.display = "block";
}

function volver() {
    document.getElementById("pantallaResultado").style.display = "none";
    document.getElementById("pantallaFormulario").style.display = "block";
}

function modoOscuro() {
    document.body.classList.toggle("dark");
}

// Cargar datos guardados
window.onload = function() {
    document.getElementById("hora").value = localStorage.getItem("hora") || "";
    document.getElementById("distancia").value = localStorage.getItem("distancia") || "";
    document.getElementById("transporte").value = localStorage.getItem("transporte") || "carro";
    document.getElementById("alistamiento").value = localStorage.getItem("alistamiento") || "";
    document.getElementById("trafico").value = localStorage.getItem("trafico") || "";
}

</script>

</body>
</html>
